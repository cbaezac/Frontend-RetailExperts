<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia · Panel de administración · Retail Experts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5A0D74;
  --purple-deep: #3D0850;
  --purple-light: #7B1E99;
  --orange: #FF5A1F;
  --orange-light: #FF7A45;
  --cream: #FFF8E7;
  --cream-dark: #F5EDD4;
  --ink: #1A0820;
  --white: #FFFFFF;
  --accent: #5A0D74;
  --font-display: 'Bricolage Grotesque', sans-serif;
  --font-body: 'Manrope', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header (igual al panel) */
.admin-header {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 14px clamp(20px, 4vw, 40px);
  background: var(--cream);
  border-bottom: 1px solid var(--cream-dark);
}
.admin-header .logo-img { height: 40px; width: auto; display: block; }
.header-divider { width: 1px; height: 26px; background: rgba(90,13,116,.18); }
.header-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--purple); letter-spacing: -0.01em; }
.header-spacer { margin-left: auto; }
.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px;
  background: transparent; color: var(--purple);
  border: 1.5px solid rgba(90,13,116,.25); border-radius: 999px;
  font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
  transition: background .2s, color .2s, border-color .2s;
}
.back-btn:hover { background: var(--purple); color: var(--white); border-color: var(--purple); }
.back-btn svg { width: 15px; height: 15px; }

/* Empty state */
.empty {
  flex: 1 1 auto;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 48px 24px;
}
.empty-icon {
  width: 96px; height: 96px;
  display: grid; place-items: center;
  border-radius: 28px;
  background: linear-gradient(150deg, #5A0D74, #7B1E99);
  color: var(--white);
  box-shadow: 0 18px 40px #5A0D7433;
  margin-bottom: 26px;
}
.empty-icon svg { width: 46px; height: 46px; }
.soon-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 16px; border-radius: 999px;
  background: rgba(90,13,116,.07); border: 1px solid rgba(90,13,116,.16);
  font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--purple); margin-bottom: 18px;
}
.soon-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.empty h1 {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(30px, 5vw, 46px); line-height: 1.02; letter-spacing: -0.02em;
  color: var(--purple); margin-bottom: 14px;
}
.empty p { max-width: 46ch; font-size: 16px; line-height: 1.6; color: #6a5f6e; }
.empty .hint { margin-top: 8px; font-size: 13px; color: #9b90a6; }
</style>
</head>
<body>
  <header class="admin-header">
    <a class="back-btn" href="adminweb.html">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Volver al panel
    </a>
    <div class="header-divider"></div>
    <a href="index.html"><img class="logo-img" src="logo-retail-experts.png" alt="Retail Experts"></a>
    <span class="header-title">Asistencia</span>
    <div class="header-spacer"></div>
  </header>

  <main class="empty">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 2.5v4M16 2.5v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="m9 14.5 2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="soon-pill"><span class="dot"></span> Módulo 04 · En construcción</span>
    <h1>Asistencia</h1>
    <p>Control de marcaje, turnos y reportes de asistencia del equipo en terreno.</p>
    <p class="hint">Esta sección estará disponible pronto.</p>
  </main>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin-guard.js"></script>
</body>
</html>
