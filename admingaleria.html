<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galería · Panel de administración · Retail Experts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F6ECD0;
    --ink: #1C1A14;
    --muted: #6B6557;
    --frame: #15130E;
    --accent: #E0561C;
    --accent-soft: rgba(224,86,28,0.12);
    --danger: #C23A2B;
    --danger-soft: rgba(194,58,43,0.12);
    --line: rgba(28,26,20,0.18);
    --card: #FFFDF6;
  }
  html { height: 100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(224,86,28,0.09) 0%, rgba(0,0,0,0) 55%),
      var(--bg);
    min-height: 100vh;
    padding: clamp(76px, 10vh, 110px) clamp(20px, 4vw, 56px) 72px;
    overflow-x: hidden;
  }

  .back {
    position: fixed;
    top: clamp(20px, 3vw, 32px);
    left: clamp(20px, 4vw, 48px);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--ink);
    text-decoration: none;
    padding: 11px 20px 11px 16px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(4px);
    z-index: 30;
    transition: gap .25s ease;
  }
  .back .arrow { transition: transform .25s ease; }
  .back:hover { background: var(--frame); color: #fff; gap: 12px; }
  .back:hover .arrow { transform: translateX(-3px); }
  .back:focus-visible { outline: 3px solid rgba(28,26,20,0.4); outline-offset: 3px; }

  .admin-flag {
    position: fixed;
    top: clamp(20px, 3vw, 32px);
    right: clamp(20px, 4vw, 48px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 0.74rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #FFF8E7;
    background: #5A0D74;
    border-radius: 999px;
    padding: 9px 16px;
    z-index: 30;
    box-shadow: 0 10px 24px rgba(90,13,116,0.3);
  }
  .admin-flag svg { width: 14px; height: 14px; }

  .wrap { max-width: 1280px; margin: 0 auto; }

  .head { text-align: center; margin-bottom: clamp(28px, 4vh, 44px); }
  .eyebrow {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    line-height: 0.98;
    letter-spacing: -0.02em;
  }

  /* ---- Big category buttons ---- */
  .cats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(12px, 1.6vw, 18px);
    margin-bottom: clamp(20px, 2.6vh, 28px);
  }
  .cat {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.5vw, 1.35rem);
    letter-spacing: -0.01em;
    color: var(--ink);
    cursor: pointer;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 18px;
    padding: clamp(17px, 2.4vw, 30px) 18px;
    text-align: center;
    line-height: 1.15;
    transition: transform .2s ease, box-shadow .25s ease;
  }
  .cat:hover { transform: translateY(-3px); border-color: var(--ink); box-shadow: 0 10px 24px rgba(28,26,20,0.1); }
  .cat[aria-pressed="true"] {
    background: var(--frame);
    color: #FFF8E7;
    border-color: var(--frame);
    box-shadow: 0 16px 36px rgba(28,26,20,0.28);
  }
  .cat:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  /* ---- Small filter buttons + dropdowns ---- */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: clamp(26px, 3.4vh, 36px);
  }
  .flabel {
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-wrap { position: relative; }
  .filter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink);
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 15px;
    transition: box-shadow .2s ease;
  }
  .filter:hover { background: #fff; border-color: var(--ink); }
  .filter .chev { transition: transform .2s ease; }
  .filter[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .filter.has-selection { background: var(--frame); color: #FFF8E7; border-color: var(--frame); }
  .filter .count {
    font-size: 0.74rem;
    background: rgba(255,255,255,0.22);
    color: inherit;
    border-radius: 999px;
    padding: 1px 7px;
    font-weight: 700;
  }
  .filter:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .dropdown {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    width: 250px;
    background: #FFFDF6;
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 24px 60px rgba(28,26,20,0.22);
    padding: 12px;
    z-index: 40;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s ease, visibility .18s;
  }
  .filter-wrap.open .dropdown {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .dd-search {
    width: 100%;
    font-family: 'Manrope', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 9px 12px;
    margin-bottom: 10px;
    outline: none;
  }
  .dd-search::placeholder { color: var(--muted); }
  .dd-search:focus { border-color: var(--accent); }
  .dd-list {
    max-height: 200px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .dd-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 9px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.92rem;
    color: var(--ink);
    transition: background .15s ease;
  }
  .dd-item:hover { background: rgba(28,26,20,0.06); }
  .dd-item input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .dd-empty { padding: 10px 9px; font-size: 0.88rem; color: var(--muted); }

  /* ---- Date range dropdown ---- */
  .dropdown-date { width: 240px; }
  .dd-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .dd-field label {
    font-size: 0.78rem;
    letter-spacing: 0.02em;
    color: var(--muted);
    font-weight: 600;
  }
  .dd-date {
    font-family: 'Manrope', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 9px 11px;
    outline: none;
    color-scheme: light;
  }
  .dd-date:focus { border-color: var(--accent); }
  .dd-actions { display: flex; gap: 8px; margin-top: 4px; }
  .dd-clear, .dd-apply {
    flex: 1;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 0.86rem;
    cursor: pointer;
    border-radius: 9px;
    padding: 9px 12px;
    transition: box-shadow .18s ease;
  }
  .dd-clear {
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--line);
  }
  .dd-clear:hover { background: rgba(28,26,20,0.06); }
  .dd-apply {
    color: #FFF8E7;
    background: var(--frame);
    border: 1px solid var(--frame);
  }
  .dd-apply:hover { background: #2c2820; }

  /* ---- Apply filters bar ---- */
  .applybar { display: flex; justify-content: center; margin-bottom: clamp(28px, 4vh, 40px); }
  .btn-apply {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 1.02rem;
    cursor: pointer;
    color: #FFF8E7;
    background: var(--frame);
    border: none;
    border-radius: 999px;
    padding: 14px 36px;
    box-shadow: 0 14px 32px rgba(28,26,20,0.22);
    transition: transform .2s ease, gap .2s ease, box-shadow .2s ease;
  }
  .btn-apply svg { display: block; }
  .btn-apply:hover { transform: translateY(-2px); gap: 13px; box-shadow: 0 18px 40px rgba(28,26,20,0.3); }
  .btn-apply:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  /* ---- Gallery toolbar ---- */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .sel-count {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--muted);
  }
  .toolbar-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 0.92rem;
    cursor: pointer;
    border-radius: 999px;
    padding: 11px 20px;
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .btn-ghost {
    color: var(--ink);
    background: var(--card);
    border: 1.5px solid var(--line);
  }
  .btn-ghost:hover { background: #fff; border-color: var(--ink); }
  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: rgba(28,26,20,0.4);
    background: rgba(28,26,20,0.05);
    border: 1.5px solid transparent;
    pointer-events: none;
  }
  .btn-download.active {
    color: #FFF8E7;
    background: var(--accent);
    border-color: var(--accent);
    pointer-events: auto;
    box-shadow: 0 12px 28px rgba(224,86,28,0.34);
  }
  .btn-download.active:hover { transform: translateY(-2px); }
  /* ---- Delete button (admin) ---- */
  .btn-delete {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: rgba(28,26,20,0.4);
    background: rgba(28,26,20,0.05);
    border: 1.5px solid transparent;
    pointer-events: none;
  }
  .btn-delete svg { display: block; }
  .btn-delete.active {
    color: #FFF8E7;
    background: var(--danger);
    border-color: var(--danger);
    pointer-events: auto;
    box-shadow: 0 12px 28px rgba(194,58,43,0.32);
  }
  .btn-delete.active:hover { transform: translateY(-2px); }
  .btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  /* ---- Photo frame grid (black frame + white mat) ---- */
  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(12px, 1.5vw, 20px);
  }
  .photo {
    position: relative;
    cursor: pointer;
    background: #E8E5DC;
    border: clamp(2px, 0.22vw, 3px) solid var(--frame);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 12px 26px rgba(28,26,20,0.16);
    display: block;
    transition: transform .2s ease, box-shadow .2s ease, opacity .3s ease;
  }
  .photo:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(28,26,20,0.22); }
  .photo.removing { opacity: 0; transform: scale(0.9); pointer-events: none; }
  .photo .ph {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #E8E5DC;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: rgba(28,26,20,0.32);
    pointer-events: none;
  }
  .photo .ph svg { display: block; opacity: 0.7; }
  .photo .ph span { font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.8rem; letter-spacing: 0.04em; }

  .photo .check {
    position: absolute;
    top: 10px; right: 10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--frame);
    display: flex; align-items: center; justify-content: center;
    transition: background .18s ease, border-color .18s ease, transform .18s ease;
  }
  .photo .check svg { opacity: 0; transition: opacity .15s ease; }
  .photo[aria-selected="true"] {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224,86,28,0.35), 0 16px 34px rgba(224,86,28,0.22);
  }
  .photo[aria-selected="true"] .check { background: var(--accent); border-color: var(--accent); transform: scale(1.05); }
  .photo[aria-selected="true"] .check svg { opacity: 1; }

  .empty-gallery {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1.05rem;
  }

  @media (max-width: 860px) {
    .cats { grid-template-columns: repeat(2, 1fr); }
    .gallery { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
  <a class="back" href="adminweb.html"><span class="arrow">←</span> Volver al panel</a>
  <span class="admin-flag">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Administrador
  </span>

  <div class="wrap">
    <header class="head">
      <h1>Galería</h1>
    </header>

    <!-- Big category buttons -->
    <div class="cats" role="group" aria-label="Tipo de fotografía">
      <button class="cat" type="button" aria-pressed="true">Góndola</button>
      <button class="cat" type="button" aria-pressed="false">Cartelería</button>
      <button class="cat" type="button" aria-pressed="false">Exhibiciones</button>
      <button class="cat" type="button" aria-pressed="false">Espacios Adicionales</button>
    </div>

    <!-- Small filter buttons (dropdowns built by JS) -->
    <div class="filters" id="filters" role="group" aria-label="Filtros">
      <span class="flabel">Filtrar por</span>
    </div>

    <!-- Apply filters -->
    <div class="applybar">
      <button class="btn-apply" id="applyBtn" type="button">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Aplicar filtros
      </button>
    </div>

    <!-- Gallery toolbar -->
    <div class="toolbar">
      <span class="sel-count" id="selCount">Ninguna fotografía seleccionada</span>
      <div class="toolbar-actions">
        <button class="btn btn-ghost" id="selectAll" type="button">Seleccionar todo</button>
        <button class="btn btn-download" id="downloadBtn" type="button">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3v12m0 0l-4.5-4.5M12 15l4.5-4.5M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="dlLabel">Descargar</span>
        </button>
        <button class="btn btn-delete" id="deleteBtn" type="button">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0-.7 12a2 2 0 0 1-2 1.9H7.7a2 2 0 0 1-2-1.9L5 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11v5M14 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="delLabel">Eliminar</span>
        </button>
      </div>
    </div>

    <!-- Photo frame grid -->
    <div class="gallery" id="gallery"></div>
  </div>

  <script>
    /* ---------- Filter dropdowns ---------- */
    // Opciones de cada subfiltro
    var OPTIONS = {
      'Fecha':        { type: 'daterange' },
      'Cadena':       ['Cencosud', 'Tottus', 'SMU', 'Walmart'],
      'Formato':      ['Jumbo', 'Hiper Lider', 'Lider Express', 'Santa Isabel', 'Tottus', 'Unimarc'],
      'Región':       ['Metropolitana', 'Valparaíso', 'Biobío', 'Maule', 'Antofagasta'],
      'Código Local': ['L-001', 'L-002', 'L-003', 'L-004', 'L-005'],
      'Nombre Local': ['Jumbo Costanera', 'Jumbo Kennedy', 'Jumbo La Florida', 'Hiper Lider Buenaventura', 'Hiper Lider Puente Nuevo'],
      'Categoría':    ['Aceites', 'Limpieza', 'Mundo Bebe', 'Mundo Bio', 'Preservativos'],
      'Nombre Ciclo': ['Ciclo 1', 'Ciclo 2', 'Ciclo 3', 'Ciclo 4', 'Ciclo 5'],
      'Mueble':       ['Isla', 'Cabecera', 'Punta de Góndola', 'Exhibidor', 'Chimenea']
    };

    // Subfiltros disponibles según el tipo de fotografía
    var CATEGORY_FILTERS = {
      'Góndola':              ['Fecha', 'Cadena', 'Formato', 'Región', 'Código Local', 'Nombre Local', 'Categoría'],
      'Cartelería':           ['Fecha', 'Cadena', 'Formato', 'Región', 'Código Local', 'Nombre Local', 'Nombre Ciclo'],
      'Exhibiciones':         ['Fecha', 'Cadena', 'Formato', 'Región', 'Código Local', 'Nombre Local', 'Nombre Ciclo', 'Mueble'],
      'Espacios Adicionales': ['Fecha', 'Cadena', 'Formato', 'Región', 'Código Local', 'Nombre Local', 'Mueble']
    };

    var filtersEl = document.getElementById('filters');

    function buildFilter(f) {
      var wrap = document.createElement('div');
      wrap.className = 'filter-wrap';

      var btn = document.createElement('button');
      btn.className = 'filter';
      btn.type = 'button';
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = '<span class="fname">' + f.name + '</span>' +
        '<span class="chev" aria-hidden="true">' +
        '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';

      var dd = document.createElement('div');
      dd.className = 'dropdown';

      if (f.type === 'daterange') {
        // ----- Custom date range (inicio / término) -----
        dd.classList.add('dropdown-date');
        dd.innerHTML =
          '<div class="dd-field"><label>Fecha de inicio</label><input type="date" class="dd-date" data-role="start" /></div>' +
          '<div class="dd-field"><label>Fecha de término</label><input type="date" class="dd-date" data-role="end" /></div>' +
          '<div class="dd-actions">' +
            '<button type="button" class="dd-clear">Limpiar</button>' +
            '<button type="button" class="dd-apply">Aplicar</button>' +
          '</div>';

        wrap.appendChild(btn);
        wrap.appendChild(dd);
        filtersEl.appendChild(wrap);

        var startEl = dd.querySelector('[data-role="start"]');
        var endEl = dd.querySelector('[data-role="end"]');

        // Toggle open
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = wrap.classList.contains('open');
          closeAllDropdowns();
          if (!isOpen) {
            wrap.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
          }
        });

        dd.addEventListener('click', function (e) { e.stopPropagation(); });

        // Keep end >= start
        startEl.addEventListener('change', function () { if (startEl.value) endEl.min = startEl.value; });

        function fmt(v) {
          var p = v.split('-'); // yyyy-mm-dd
          return p[2] + '/' + p[1] + '/' + p[0];
        }
        function applyDate() {
          var s = startEl.value, en = endEl.value;
          if (s || en) {
            btn.classList.add('has-selection');
            var c = btn.querySelector('.count');
            if (!c) { c = document.createElement('span'); c.className = 'count'; btn.appendChild(c); }
            if (s && en)      c.textContent = fmt(s) + ' – ' + fmt(en);
            else if (s)       c.textContent = 'Desde ' + fmt(s);
            else              c.textContent = 'Hasta ' + fmt(en);
          } else {
            btn.classList.remove('has-selection');
            var c2 = btn.querySelector('.count');
            if (c2) c2.remove();
          }
          closeAllDropdowns();
        }
        dd.querySelector('.dd-apply').addEventListener('click', applyDate);
        dd.querySelector('.dd-clear').addEventListener('click', function () {
          startEl.value = ''; endEl.value = ''; endEl.min = '';
          btn.classList.remove('has-selection');
          var c2 = btn.querySelector('.count');
          if (c2) c2.remove();
          closeAllDropdowns();
        });
        return; // done with this (date) filter
      }

      // ----- Standard list filter (search + checkboxes) -----
      dd.innerHTML =
        '<input class="dd-search" type="text" placeholder="Buscar ' + f.name.toLowerCase() + '…" />' +
        '<div class="dd-list"></div>';

      var list = dd.querySelector('.dd-list');
      f.options.forEach(function (opt) {
        var item = document.createElement('label');
        item.className = 'dd-item';
        item.innerHTML = '<input type="checkbox" value="' + opt + '" /><span>' + opt + '</span>';
        list.appendChild(item);
      });

      wrap.appendChild(btn);
      wrap.appendChild(dd);
      filtersEl.appendChild(wrap);

      // Toggle open
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = wrap.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) {
          wrap.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
          dd.querySelector('.dd-search').focus();
        }
      });

      // Search within dropdown
      var search = dd.querySelector('.dd-search');
      search.addEventListener('click', function (e) { e.stopPropagation(); });
      search.addEventListener('input', function () {
        var q = search.value.toLowerCase().trim();
        var any = false;
        list.querySelectorAll('.dd-item').forEach(function (it) {
          var match = it.textContent.toLowerCase().indexOf(q) !== -1;
          it.style.display = match ? 'flex' : 'none';
          if (match) any = true;
          var cb = it.querySelector('input[type="checkbox"]');
          if (cb) {
            if (q && match && !cb.checked) {
              cb.checked = true;
              cb.setAttribute('data-auto', '1');
            } else if (cb.getAttribute('data-auto') === '1' && (!q || !match)) {
              cb.checked = false;
              cb.removeAttribute('data-auto');
            }
          }
        });
        dd.dispatchEvent(new Event('change'));
        var empty = dd.querySelector('.dd-empty');
        if (!any && !empty) {
          empty = document.createElement('div');
          empty.className = 'dd-empty';
          empty.textContent = 'Sin resultados';
          list.appendChild(empty);
        } else if (any && empty) {
          empty.remove();
        }
      });

      // Track selections
      dd.addEventListener('click', function (e) { e.stopPropagation(); });
      dd.addEventListener('change', function () {
        var n = dd.querySelectorAll('input[type="checkbox"]:checked').length;
        if (n > 0) {
          btn.classList.add('has-selection');
          var c = btn.querySelector('.count');
          if (!c) { c = document.createElement('span'); c.className = 'count'; btn.appendChild(c); }
          c.textContent = n;
        } else {
          btn.classList.remove('has-selection');
          var c2 = btn.querySelector('.count');
          if (c2) c2.remove();
        }
      });
    }

    // (Re)build the filter row for a given category
    function renderFilters(catName) {
      closeAllDropdowns();
      filtersEl.querySelectorAll('.filter-wrap').forEach(function (w) { w.remove(); });
      var names = CATEGORY_FILTERS[catName] || [];
      names.forEach(function (name) {
        var spec = OPTIONS[name];
        if (!spec) return;
        if (spec.type === 'daterange') buildFilter({ name: name, type: 'daterange' });
        else buildFilter({ name: name, options: spec });
      });
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.filter-wrap.open').forEach(function (w) {
        w.classList.remove('open');
        w.querySelector('.filter').setAttribute('aria-expanded', 'false');
      });
    }
    document.addEventListener('click', closeAllDropdowns);

    /* ---------- Big category buttons (single select) ---------- */
    document.querySelectorAll('.cat').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.cat').forEach(function (b) { b.setAttribute('aria-pressed', 'false'); });
        btn.setAttribute('aria-pressed', 'true');
        renderFilters(btn.textContent.trim());
      });
    });

    // Initial filter row (default selected category)
    var initialCat = document.querySelector('.cat[aria-pressed="true"]');
    renderFilters(initialCat ? initialCat.textContent.trim() : 'Góndola');

    /* ---------- Photo grid + selection ---------- */
    var gallery = document.getElementById('gallery');
    var PHOTO_COUNT = 9;
    var photoSvg = '<div class="ph">' +
      '<svg width="34" height="34" viewBox="0 0 24 24" fill="none">' +
      '<rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/>' +
      '<circle cx="8.5" cy="10" r="1.6" stroke="currentColor" stroke-width="1.6"/>' +
      '<path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg><span>Fotografía</span></div>';
    var checkSvg = '<div class="check"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#FFF8E7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';

    function makePhoto() {
      var d = document.createElement('div');
      d.className = 'photo';
      d.setAttribute('aria-selected', 'false');
      d.innerHTML = photoSvg + checkSvg;
      d.addEventListener('click', function () {
        var sel = this.getAttribute('aria-selected') === 'true';
        this.setAttribute('aria-selected', sel ? 'false' : 'true');
        updateSelection();
      });
      return d;
    }

    for (var i = 0; i < PHOTO_COUNT; i++) {
      gallery.appendChild(makePhoto());
    }

    var selCount = document.getElementById('selCount');
    var downloadBtn = document.getElementById('downloadBtn');
    var dlLabel = document.getElementById('dlLabel');
    var deleteBtn = document.getElementById('deleteBtn');
    var delLabel = document.getElementById('delLabel');
    var selectAll = document.getElementById('selectAll');

    function updateSelection() {
      var photos = gallery.querySelectorAll('.photo');
      var selected = gallery.querySelectorAll('.photo[aria-selected="true"]');
      var n = selected.length;

      if (n === 0) {
        selCount.textContent = photos.length === 0
          ? 'No quedan fotografías'
          : 'Ninguna fotografía seleccionada';
        downloadBtn.classList.remove('active');
        dlLabel.textContent = 'Descargar';
        deleteBtn.classList.remove('active');
        delLabel.textContent = 'Eliminar';
      } else {
        selCount.textContent = n + (n === 1 ? ' fotografía seleccionada' : ' fotografías seleccionadas');
        downloadBtn.classList.add('active');
        dlLabel.textContent = 'Descargar (' + n + ')';
        deleteBtn.classList.add('active');
        delLabel.textContent = 'Eliminar (' + n + ')';
      }
      selectAll.textContent = (n === photos.length && n > 0) ? 'Quitar selección' : 'Seleccionar todo';
    }

    selectAll.addEventListener('click', function () {
      var photos = gallery.querySelectorAll('.photo');
      if (photos.length === 0) return;
      var allSelected = gallery.querySelectorAll('.photo[aria-selected="true"]').length === photos.length;
      photos.forEach(function (p) { p.setAttribute('aria-selected', allSelected ? 'false' : 'true'); });
      updateSelection();
    });

    downloadBtn.addEventListener('click', function () {
      if (!downloadBtn.classList.contains('active')) return;
      var n = gallery.querySelectorAll('.photo[aria-selected="true"]').length;
      // Placeholder: aquí se conectará la descarga real de las fotografías.
      alert('Descargando ' + n + (n === 1 ? ' fotografía' : ' fotografías') + '…');
    });

    /* ---------- Eliminar fotografías (perfil administrador) ---------- */
    deleteBtn.addEventListener('click', function () {
      if (!deleteBtn.classList.contains('active')) return;
      var selected = gallery.querySelectorAll('.photo[aria-selected="true"]');
      var n = selected.length;
      if (n === 0) return;

      var msg = n === 1
        ? '¿Eliminar la fotografía seleccionada? Esta acción no se puede deshacer.'
        : '¿Eliminar las ' + n + ' fotografías seleccionadas? Esta acción no se puede deshacer.';
      if (!confirm(msg)) return;

      // Placeholder: aquí se conectará la eliminación real en el backend.
      selected.forEach(function (p) {
        p.classList.add('removing');
        setTimeout(function () { p.remove(); checkEmpty(); }, 280);
      });
      setTimeout(updateSelection, 300);
    });

    function checkEmpty() {
      if (gallery.querySelectorAll('.photo').length === 0 && !gallery.querySelector('.empty-gallery')) {
        var e = document.createElement('div');
        e.className = 'empty-gallery';
        e.textContent = 'No quedan fotografías en esta vista.';
        gallery.appendChild(e);
      }
    }

    /* ---------- Apply filters ---------- */
    document.getElementById('applyBtn').addEventListener('click', function () {
      var cat = document.querySelector('.cat[aria-pressed="true"]');
      var catName = cat ? cat.textContent.trim() : '—';
      var active = document.querySelectorAll('.filter.has-selection').length;
      // Placeholder: aquí se aplicará el filtrado real sobre las fotografías.
      alert('Aplicando filtros\nTipo: ' + catName + '\nFiltros adicionales: ' + active);
    });
  </script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin-guard.js"></script>
  <script src="assets/js/admin-galeria-api.js?v=202607031015"></script>
</body>
