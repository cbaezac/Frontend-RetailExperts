<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retail Experts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FBF3E2;
    --ink: #2C0E4A;
    --brand-purple: #5B1A8B;
    --brand-purple-dark: #2D0A48;
    --brand-magenta: #8E1FA8;
    --brand-orange: #F4631E;
    --header-h: 78px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--brand-purple-dark);
    color: #fff;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ---------- Floating logout button ---------- */
  .topbar {
    position: fixed;
    top: clamp(18px, 3vw, 28px);
    right: clamp(20px, 4vw, 56px);
    z-index: 50;
  }

  .btn-logout {
    display: inline-block;
    text-decoration: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    background: var(--brand-purple);
    border: none;
    border-radius: 999px;
    padding: 12px 26px;
    cursor: pointer;
    transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
    box-shadow: 0 6px 18px rgba(91,26,139,0.28);
  }
  .btn-logout:hover { background: #471173; transform: translateY(-1px); box-shadow: 0 10px 24px rgba(91,26,139,0.34); }
  .btn-logout:active { transform: translateY(0); }

  /* ---------- Panels ---------- */
  .panels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    min-height: 100vh;
  }

  .panel {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    padding: 64px 40px;
    min-height: 100vh;
    isolation: isolate;
  }

  .panel + .panel { border-left: 1px solid rgba(255,255,255,0.06); }

  .panel-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.06);
    transition: transform 1.1s cubic-bezier(.16,.84,.36,1);
    z-index: -2;
  }

  .panel-overlay {
    position: absolute;
    inset: 0;
    z-index: -1;
    transition: opacity .6s ease;
  }

  /* fallback solid colors + tinted image overlays */
  .panel.db    { background: #5A0D74; }
  .panel.dash  { background: #FF5A1F; }
  .panel.gal   { background: #FFF8E7; }

  .db   .panel-overlay { background: linear-gradient(165deg, rgba(90,13,116,0.82) 0%, rgba(90,13,116,0.55) 55%, rgba(110,20,140,0.5) 100%); }
  .dash .panel-overlay { background: linear-gradient(165deg, rgba(255,90,31,0.78) 0%, rgba(255,90,31,0.5) 55%, rgba(255,110,50,0.46) 100%); }
  .gal  .panel-overlay { background: linear-gradient(165deg, rgba(255,248,231,0.82) 0%, rgba(255,248,231,0.58) 55%, rgba(255,248,231,0.5) 100%); }

  .panel:hover .panel-bg { transform: scale(1.16); }
  .panel:hover .panel-overlay { opacity: 0.82; }

  .panel-content {
    position: static;
    z-index: 1;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .panel h2 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 3vw, 3rem);
    letter-spacing: -0.015em;
    text-shadow: 0 2px 26px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
  }

  /* The descriptive phrase IS the button now */
  .panel-link {
    margin-top: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: clamp(0.95rem, 1.05vw, 1.08rem);
    line-height: 1.35;
    color: #fff;
    text-align: center;
    text-decoration: none;
    text-shadow: 0 1px 10px rgba(0,0,0,0.45);
    max-width: 320px;
    cursor: pointer;
    padding: 16px 24px;
    border: 1.5px solid rgba(255,255,255,0.65);
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(3px);
    transition: background .25s ease, border-color .25s ease, transform .25s ease;
  }
  .panel-link:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); border-color: #fff; }
  /* hover anywhere on the panel lights up the visible button */
  .panel:hover .panel-link { transform: translateY(-2px); background: rgba(255,255,255,0.14); border-color: #fff; }
  .panel:focus-visible { outline: 3px solid rgba(255,255,255,0.7); outline-offset: -5px; }

  /* Galería uses a light cream overlay → dark text for readability */
  .gal h2 { color: #3A2208; text-shadow: 0 1px 12px rgba(255,248,231,0.7); }
  .gal .panel-link {
    color: #3A2208;
    border-color: rgba(58,34,8,0.55);
    background: rgba(58,34,8,0.06);
    text-shadow: none;
  }
  .gal .panel-link:hover { background: rgba(58,34,8,0.12); border-color: #3A2208; }
  .gal.panel:hover .panel-link { background: rgba(58,34,8,0.12); border-color: #3A2208; }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .panels {
      grid-template-columns: 1fr;
    }
    .panel {
      min-height: 70vh;
    }
    .panel + .panel { border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
  }

  @media (max-width: 480px) {
    .btn-logout { padding: 10px 20px; font-size: 14px; }
    .panel { min-height: 64vh; padding: 56px 28px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .panel-bg, .panel:hover .panel-bg { transition: none; }
  }
</style>
</head>
